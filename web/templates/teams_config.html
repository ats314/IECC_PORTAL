<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IECC Portal — Teams Setup</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://res.cdn.office.net/teams-js/2.49.0/js/MicrosoftTeams.min.js"></script>
    <style>
        body { background: var(--bg-light); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .config-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius);
            padding: 2rem; max-width: 400px; width: 100%; box-shadow: var(--shadow-md); text-align: center; }
        .config-card h2 { color: var(--icc-green); margin-bottom: 0.5rem; }
        .config-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .config-icon { font-size: 3rem; margin-bottom: 1rem; }
        .config-status { margin-top: 1rem; font-size: 0.85rem; color: var(--success); }
    </style>
</head>
<body>
    <div class="config-card">
        <div class="config-icon">&#9881;</div>
        <h2>IECC Meeting Portal</h2>
        <p>This app embeds the IECC Code Development Portal in your Teams meeting. Chairs can manage proposals, record votes, and generate circulation forms — all within the meeting side panel.</p>
        <p style="font-size: 0.85rem; color: var(--text-muted);">Click <strong>Save</strong> below to add the portal to this meeting.</p>
        <div class="config-status" id="config-status"></div>
    </div>

    <script>
    (async function() {
        await microsoftTeams.app.initialize();

        // Enable the Save button
        microsoftTeams.pages.config.setValidityState(true);

        // When Save is clicked, tell Teams what URL to load in the side panel
        microsoftTeams.pages.config.registerOnSaveHandler(function(saveEvent) {
            microsoftTeams.pages.config.setConfig({
                entityId: "iecc-portal",
                contentUrl: window.location.origin + "/home?embedded=teams",
                suggestedDisplayName: "IECC Portal",
                websiteUrl: window.location.origin + "/home"
            });
            saveEvent.notifySuccess();
        });

        document.getElementById('config-status').textContent = 'Ready to save.';
    })();
    </script>
</body>
</html>
