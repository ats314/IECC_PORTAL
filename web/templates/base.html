<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ICC Code Development Platform{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/htmx.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">ICC Code Development Platform</a>
        </div>
        <div class="nav-links">
            <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/proposals" class="{% if active == 'proposals' %}active{% endif %}">Proposals</a>
            <a href="/meetings" class="{% if active == 'meetings' %}active{% endif %}">Meetings</a>
            <a href="/circ-forms" class="{% if active == 'circ-forms' %}active{% endif %}">Circ Forms</a>
            {% if user %}
            <span style="color: var(--icc-accent); font-size: 0.85rem; padding: 0.5rem 0; margin-left: 1rem;">{{ user.name }}</span>
            {% endif %}
            <a href="/logout" style="font-size: 0.85rem; color: var(--text-muted);">Sign Out</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>ICC Code Development Platform v0.1</span>
        <span>IECC 2027 Cycle</span>
    </footer>
</body>
</html>
