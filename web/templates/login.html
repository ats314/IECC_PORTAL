<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ICC Code Development Platform</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .login-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 0 1rem;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            color: var(--icc-green);
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }
        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .role-section {
            margin-bottom: 1.5rem;
        }
        .role-section h3 {
            color: var(--icc-green);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-light);
        }
        .user-option {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .user-option:hover {
            border-color: var(--icc-green);
            background: rgba(11, 89, 64, 0.04);
        }
        .user-option input[type="radio"] {
            margin-right: 0.75rem;
            accent-color: var(--icc-green);
        }
        .user-option .user-name {
            color: var(--text-heading);
            font-weight: 600;
        }
        .user-option .user-title {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.1rem;
        }
        .login-btn {
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/login">ICC Code Development Platform</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Sign In</h1>
                <p>Select your account to continue</p>
            </div>

            <form method="POST" action="/login">
                <div class="role-section">
                    <h3>Secretariat</h3>
                    {% for uid, u in secretariat_users.items() %}
                    <label class="user-option">
                        <input type="radio" name="user_id" value="{{ uid }}" {% if loop.first %}checked{% endif %}>
                        <div>
                            <div class="user-name">{{ u.name }}</div>
                            <div class="user-title">{{ u.title }}</div>
                        </div>
                    </label>
                    {% endfor %}
                </div>

                <div class="role-section">
                    <h3>Subgroup Chairs</h3>
                    {% for uid, u in chair_users.items() %}
                    <label class="user-option">
                        <input type="radio" name="user_id" value="{{ uid }}">
                        <div>
                            <div class="user-name">{{ u.name }}</div>
                            <div class="user-title">{{ u.title }} — {{ u.body }}</div>
                        </div>
                    </label>
                    {% endfor %}
                </div>

                <button type="submit" class="btn btn-primary btn-lg login-btn">Sign In</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <span>ICC Code Development Platform v0.1</span>
        <span>IECC 2027 Cycle</span>
    </footer>
</body>
</html>
